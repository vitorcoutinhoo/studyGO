<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Plantões</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }
    input, select, button { padding: 6px; margin-top: 4px; }
    button { cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 13px; }
    th { background: #f0f0f0; }
    #msg-criar { color: red; }
    #msg-listar { color: red; }
    .success { color: green !important; }
    fieldset { margin-top: 20px; padding: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .row label { display: flex; flex-direction: column; font-size: 13px; }
    nav a { margin-right: 12px; }
  </style>
</head>
<body>
  <nav>
    <a href="login.html">Login</a>
    <a href="colaboradores.html">Colaboradores</a>
    <a href="plantoes.html">Plantões</a>
    <a href="modelos-comunicacao.html">Modelos</a>
  </nav>

  <h2>Plantões</h2>
  <div style="background:#f9f9f9;border:1px solid #ddd;padding:10px;margin-bottom:12px">
    <label style="font-size:13px">Token JWT:
      <input type="text" id="token-input" placeholder="Cole o token aqui ou faça login" style="width:600px;font-size:11px">
    </label>
    <button onclick="salvarToken()" style="margin-left:6px">Usar token</button>
    <span id="token-status" style="font-size:12px;margin-left:8px;color:#555"></span>
  </div>

  <!-- Cadastrar -->
  <fieldset>
    <legend>Agendar Plantão</legend>
    <div class="row">
      <label>Colaborador ID <input id="colaborador_id" type="text" placeholder="UUID do colaborador"></label>
      <label>Data Início <input id="inicio" type="date"></label>
      <label>Data Fim <input id="fim" type="date"></label>
    </div>
    <button style="margin-top:12px" onclick="criarPlantao()">Agendar</button>
    <p id="msg-criar"></p>
  </fieldset>

  <!-- Atualizar status -->
  <fieldset>
    <legend>Atualizar Status de Plantão</legend>
    <div class="row">
      <label>Plantão ID <input id="plantao_id_status" type="text" placeholder="UUID do plantão"></label>
      <label>Novo Status
        <select id="novo_status">
          <option value="0">0 - Agendado</option>
          <option value="1">1 - Em Andamento</option>
          <option value="2">2 - Concluído</option>
          <option value="3">3 - Cancelado</option>
          <option value="4">4 - Pago</option>
        </select>
      </label>
    </div>
    <button style="margin-top:12px" onclick="atualizarStatus()">Atualizar</button>
    <p id="msg-status"></p>
  </fieldset>

  <!-- Listar -->
  <fieldset>
    <legend>Listar Plantões</legend>
    <div class="row">
      <button onclick="listarPlantoes()">Buscar todos</button>
      <label>Por Colaborador ID
        <div style="display:flex;gap:4px">
          <input id="filtro_colaborador_id" type="text" placeholder="UUID">
          <button onclick="listarPorColaborador()">Buscar</button>
        </div>
      </label>
    </div>
    <p id="msg-listar"></p>
    <div id="tabela-container"></div>
  </fieldset>

  <script>
    const API = 'http://localhost:8080/api/v1';

    function getToken() {
      const input = document.getElementById('token-input');
      const fromInput = input && input.value.trim();
      return fromInput || localStorage.getItem('token') || sessionStorage.getItem('token');
    }

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getToken()
      };
    }

    function salvarToken() {
      const val = document.getElementById('token-input').value.trim();
      if (val) {
        localStorage.setItem('token', val);
        sessionStorage.setItem('token', val);
        document.getElementById('token-status').textContent = 'Token salvo!';
      }
    }

    window.onload = () => {
      const t = getToken();
      if (t) {
        document.getElementById('token-input').value = t;
        document.getElementById('token-status').textContent = 'Token carregado do storage.';
      } else {
        document.getElementById('token-status').textContent = 'Sem token — cole acima ou faça login.';
      }
    };

    async function criarPlantao() {
      const msg = document.getElementById('msg-criar');
      const body = {
        colaborador_id: document.getElementById('colaborador_id').value,
        periodo: {
          inicio: document.getElementById('inicio').value,
          fim: document.getElementById('fim').value
        }
      };

      try {
        const res = await fetch(`${API}/plantoes`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = JSON.stringify(data);
          msg.className = '';
        } else {
          msg.textContent = 'Plantão criado! ID: ' + (data.id || JSON.stringify(data));
          msg.className = 'success';
          listarPlantoes();
        }
      } catch (e) {
        msg.textContent = 'Erro: ' + e.message;
      }
    }

    async function atualizarStatus() {
      const msg = document.getElementById('msg-status');
      const id = document.getElementById('plantao_id_status').value;
      const novo_status = document.getElementById('novo_status').value;

      try {
        const res = await fetch(`${API}/plantoes/${id}/status`, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ new_status: novo_status })
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          msg.textContent = JSON.stringify(data);
          msg.style.color = 'red';
        } else {
          msg.textContent = 'Status atualizado!';
          msg.style.color = 'green';
          listarPlantoes();
        }
      } catch (e) {
        msg.textContent = 'Erro: ' + e.message;
      }
    }

    async function listarPlantoes() {
      await fetchPlantoes(`${API}/plantoes`);
    }

    async function listarPorColaborador() {
      const id = document.getElementById('filtro_colaborador_id').value;
      if (!id) return alert('Informe o ID do colaborador');
      await fetchPlantoes(`${API}/plantoes/colaborador/${id}`);
    }

    async function fetchPlantoes(url) {
      const msg = document.getElementById('msg-listar');
      const container = document.getElementById('tabela-container');

      try {
        const res = await fetch(url, { headers: authHeaders() });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = JSON.stringify(data);
          container.innerHTML = '';
          return;
        }

        const lista = Array.isArray(data) ? data : (data.plantoes || data.data || [data]);
        msg.textContent = `${lista.length} plantão(ões) encontrado(s)`;

        if (lista.length === 0) {
          container.innerHTML = '<p>Nenhum plantão.</p>';
          return;
        }

        const statusLabel = ['Agendado', 'Em Andamento', 'Concluído', 'Cancelado', 'Pago'];

        let html = `<table><thead><tr>
          <th>id</th><th>colaborador_id</th><th>inicio</th><th>fim</th><th>status</th>
        </tr></thead><tbody>`;

        lista.forEach(p => {
          // Periodo não tem json tags → Go serializa como Inicio/Fim (maiúsculo)
          const inicio = p.periodo?.Inicio ? new Date(p.periodo.Inicio).toLocaleDateString('pt-BR') : '';
          const fim = p.periodo?.Fim ? new Date(p.periodo.Fim).toLocaleDateString('pt-BR') : '';
          const status = statusLabel[p.status] ?? p.status;
          html += `<tr>
            <td>${p.id ?? ''}</td>
            <td>${p.colaborador_id ?? ''}</td>
            <td>${inicio}</td>
            <td>${fim}</td>
            <td>${status}</td>
          </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (e) {
        msg.textContent = 'Erro: ' + e.message;
      }
    }
  </script>
</body>
</html>
