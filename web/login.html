<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 16px; }
    input, button { display: block; width: 100%; margin-top: 8px; padding: 8px; box-sizing: border-box; }
    button { cursor: pointer; }
    #msg { margin-top: 12px; color: red; }
    .success { color: green; }
    nav a { margin-right: 12px; }
    #token-box { display:none; margin-top:16px; }
    #token-box textarea { width:100%; height:80px; font-size:11px; box-sizing:border-box; }
    #token-box p { font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <nav>
    <a href="login.html">Login</a>
    <a href="colaboradores.html">Colaboradores</a>
    <a href="plantoes.html">Plantões</a>
  </nav>
  <h2>Login</h2>
  <label>Email</label>
  <input type="email" id="email" placeholder="email@exemplo.com">
  <label>Senha</label>
  <input type="password" id="senha" placeholder="Senha (min 6 chars)">
  <button onclick="login()">Entrar</button>
  <p id="msg"></p>

  <div id="token-box">
    <p>Token gerado (copie e cole nas outras páginas se necessário):</p>
    <textarea id="token-display" readonly onclick="this.select()"></textarea>
    <a href="colaboradores.html"><button type="button">Ir para Colaboradores</button></a>
  </div>

  <script>
    const API = 'http://localhost:8080/api/v1';

    async function login() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const msg = document.getElementById('msg');

      msg.textContent = 'Enviando...';
      msg.className = '';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch (_) { data = {}; }

        if (!res.ok) {
          msg.textContent = `[${res.status}] ` + (data.error || data.message || text);
          return;
        }

        if (!data.token) {
          msg.textContent = 'Resposta sem token. Body: ' + text;
          return;
        }

        localStorage.setItem('token', data.token);
        sessionStorage.setItem('token', data.token);

        msg.textContent = 'Login realizado!';
        msg.className = 'success';

        document.getElementById('token-display').value = data.token;
        document.getElementById('token-box').style.display = 'block';
      } catch (e) {
        msg.textContent = 'Erro de conexão: ' + e.message;
        console.error(e);
      }
    }
  </script>
</body>
</html>
