services:
  app:
    build: .
    container_name: plantao-app
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      SERVER_HOST: 0.0.0.0
      DB_URL: postgres://postgres:password@postgres:5432/plantao?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  postgres:
    image: postgres:16
    container_name: plantao-DB

    environment:
      POSTGRES_DB: plantao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
